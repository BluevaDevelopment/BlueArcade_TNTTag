# TNT Tag Module Settings

file_version: 1
# Visual representation in menus
menus:
  vote:
    item: TNT

round:
  # Duration of each TNT Tag round in seconds when not overridden by the game setup.
  # The /baa game <id> tnt_tag time <seconds> command controls the per-round timer.
  default_seconds: 15
  convert_setup_time_from_minutes: true
  minutes_conversion_minimum_seconds: 60
  smoke_warning:
    enabled: true
    seconds: 5
    particle: SMOKE
    count: 10
    offset: 0.35

tagging:
  tagged_players:
    # Format: "min-max:tagged" or "min+:tagged"
    rules:
      - "1-4:1"
      - "5-9:2"
      - "10-14:3"
      - "15-19:4"
      - "20+:5"
    fallback: 1

  inventory_indicator:
    enabled: true
    tick_rate: 5
    critical_seconds: 5
    tnt_slot: 4
    wool_slots:
      - 3
      - 5
    wool_primary: RED_WOOL
    wool_secondary: WHITE_WOOL
    apply_helmet: true
    blink:
      min_ticks: 2
      max_ticks: 10

# Game items (optional)
items:
  # Items to give players on game start
  # Format: MATERIAL:AMOUNT:SLOT
  starting_items: []

# Potion effects (optional)
effects:
  # Effects to give players during the game
  # Format: EFFECT_TYPE:DURATION_TICKS:AMPLIFIER
  starting_effects:
    - "SPEED:999999:0"

  # Effects when player respawns
  # Format: EFFECT_TYPE:DURATION_TICKS:AMPLIFIER
  respawn_effects: []

explosion:
  particle_count: 10
