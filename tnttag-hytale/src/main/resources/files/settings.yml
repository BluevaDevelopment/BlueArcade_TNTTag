# TNT Tag Module Settings

file_version: 1
# Visual representation in menus
menus:
  vote:
    item: Weapon_Bomb_Fire

round:
  # Duration of each TNT Tag round in seconds when not overridden by the game setup.
  # TNT Tag interprets basic.time as seconds for this module.
  default_seconds: 15
  convert_setup_time_from_minutes: true
  minutes_conversion_minimum_seconds: 60
  smoke_warning:
    enabled: true
    seconds: 5
    particle: SMOKE
    count: 10
    offset: 0.35

tagging:
  tagged_players:
    # Format: "min-max:tagged" or "min+:tagged"
    rules:
      - "1-4:1"
      - "5-9:2"
      - "10-14:3"
      - "15-19:4"
      - "20+:5"
    fallback: 1

  inventory_indicator:
    enabled: true
    tick_rate: 5
    critical_seconds: 5
    wool_primary: Weapon_Bomb_Fire
    wool_secondary: Weapon_Bomb_Fire

# Game items (optional)
items:
  # Items to give players on game start
  # Format: ITEM_ID:AMOUNT:SLOT
  starting_items: []

# Potion effects (optional)
effects:
  # Effects to give players during the game
  # Format: EFFECT_TYPE:DURATION_TICKS:AMPLIFIER
  starting_effects:
    - "SPEED:999999:0"

  # Effects that only apply while the player is carrying the TNT
  # Format: EFFECT_TYPE:DURATION_TICKS:AMPLIFIER
  tagged_effects: []
  # Example:
  # - "SPEED:999999:1"

  # Effects that only apply while the player is NOT carrying the TNT
  # Format: EFFECT_TYPE:DURATION_TICKS:AMPLIFIER
  untagged_effects: []
  # Example:
  # - "JUMP_BOOST:999999:0"

  # Reserved for compatibility with the shared module config structure.
  # TNT Tag players do not respawn after elimination, so this setting is not used here.
  respawn_effects: []

explosion:
  particle_count: 10
