file_version: 1
category:
  id: tnt_tag
  name: "TNT Tag"
  description:
    - "Achievements tied to TNT Tag."
  icon: Weapon_Bomb_Fire
  sort_order: 23

achievements:
  arena_runner:
    name: "Arena Runner"
    description:
      - "Play TNT Tag matches."
    icon: Weapon_Bomb_Fire
    phases:
      1:
        name: "First blast"
        description:
          - "Play 1 match."
        conditions:
          - "{bluearcade_stat_module_tnt_tag_games_played} >= 1"
        rewards:
          commands:
            - "baa credits --action=give --target={player} --amount=10"
            - "baa xp --action=give --target={player} --amount=10"
          messages:
            - "  <gold>C</gold> <yellow>+10 credits</yellow>"
            - "  <purple>XP</purple> <light_purple>+10 XP</light_purple>"
